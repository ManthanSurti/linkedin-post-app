[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "nft"
  external_node_modules = ["@netlify/blobs", "@netlify/functions"]

# Gemini 2.5 Pro needs 20-30s — extend beyond the 10s default
[functions."gemini-generate"]
  timeout = 30

[functions."gemini-weekly"]
  timeout = 30

[functions."gemini-bulk"]
  timeout = 30

[functions."schedule-cron"]
